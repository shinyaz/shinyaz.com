<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <style>
    .bg-start { stop-color: #1a1a2e; }
    .bg-end { stop-color: #0f0f1a; }
    .letter { fill: #e2e8f0; }
    .accent { fill: #38bdf8; }
    @media (prefers-color-scheme: light) {
      .bg-start { stop-color: #f1f5f9; }
      .bg-end { stop-color: #e2e8f0; }
      .letter { fill: #0f172a; }
      .accent { fill: #0284c7; }
    }
  </style>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" class="bg-start"/>
      <stop offset="100%" class="bg-end"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <text x="148" y="340" font-family="ui-monospace, 'SF Mono', SFMono-Regular, Menlo, monospace" font-size="288" font-weight="700" class="letter" letter-spacing="-6">S.</text>
  <rect x="90" y="374" width="332" height="22" rx="11" class="accent" opacity="0.85"/>
</svg>
