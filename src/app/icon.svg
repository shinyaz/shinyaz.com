<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <style>
    .bg { fill: #1a1a2e; }
    .bg-end { stop-color: #0f0f1a; }
    .bg-start { stop-color: #1a1a2e; }
    .letter { fill: #e2e8f0; }
    .accent { fill: #38bdf8; }
    @media (prefers-color-scheme: light) {
      .bg { fill: #f1f5f9; }
      .bg-start { stop-color: #f1f5f9; }
      .bg-end { stop-color: #e2e8f0; }
      .letter { fill: #0f172a; }
      .accent { fill: #0284c7; }
    }
  </style>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" class="bg-start"/>
      <stop offset="100%" class="bg-end"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <text x="10" y="22" font-family="ui-monospace, 'SF Mono', SFMono-Regular, Menlo, monospace" font-size="18" font-weight="700" class="letter" letter-spacing="-0.5">S.</text>
  <rect x="6" y="24" width="20" height="2" rx="1" class="accent" opacity="0.85"/>
</svg>
